esp32_serial_baro:
  ros__parameters:
    serial_port: /dev/ttyACM0
    output_mode: self-relative
    frequency: 5.0
    default_local_pressure: 1004.0
    # Baseline calibration: on startup, average pressure for N seconds as UG reference
    calibration_duration: 10.0
    floor_height: 3.0
    # Floor debouncing
    floor_debounce_buffer_size: 10
    floor_debounce_consecutive: 5
    floor_debounce_deadband: 0.3
    floor_state_heartbeat: 1.0
    # Motion gating
    motion_gate_speed_threshold: 0.15
    motion_gate_window: 10
