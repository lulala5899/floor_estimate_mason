esp32_serial_baro:
  ros__parameters:
    serial_port: /dev/ttyACM0
    output_mode: self-relative
    frequency: 5.0
    default_local_pressure: 1004.0
    # Baseline calibration: on startup, average pressure for N seconds as UG reference
    calibration_duration: 10.0
    floor_height: 3.0
    # Sensor offset: subtracts mount height so altitude is ground-relative
    mount_height_offset: 1.0
    # Floor stability: how many raw floor samples must match to confirm stable
    floor_stability_window: 5
    # Heartbeat: unconditional /floor_state re-publish interval (0 to disable)
    floor_state_heartbeat: 1.0
