; PlatformIO Project Configuration File
; Single-board mode (barometer node only)

[common_env]
lib_deps =
	Wire
	ArduinoJson
	adafruit/Adafruit BMP3XX Library
	adafruit/Adafruit BusIO
	adafruit/Adafruit Unified Sensor
extra_scripts = pre:prebuild.py
src_filter = +<*> -<.git/> -<docs/> -<test/> -<tests/> -<examples/>

[env:barometer_node_s3]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps = ${common_env.lib_deps}
extra_scripts = ${common_env.extra_scripts}
build_src_filter = ${common_env.src_filter} -<barometer_node.cpp> -<barometer_node_s3.cpp>
build_flags =
	-D BARO_I2C_SDA_PIN=37
	-D BARO_I2C_SCL_PIN=38
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
board_build.flash_size = 16MB
